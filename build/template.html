<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holy Book — Autodoc · Web</title>
<style>/* Holy Book Web — wireframe sheet (shares mobile tokens) */
:root {
  --ink: #111111;
  --ink-2: #2a2a2a;
  --muted: #6b6b6b;
  --muted-2: #9a9a9a;
  --line: #d8d8d8;
  --line-2: #ececec;
  --paper: #f7f6f4;
  --card: #ffffff;
  --accent: #ff5a1f;
  --accent-soft: #ffe9df;
  --good: #2e7d32;
  --bad: #c62828;
  --rule: #efece6;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.mono { font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace; }

/* ---------- Layout ---------- */
.layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.toc {
  position: sticky; top: 0; align-self: start;
  height: 100vh; overflow-y: auto;
  border-right: 1px solid var(--line);
  padding: 32px 24px; background: var(--paper);
}
.toc-brand { font-weight: 600; font-size: 18px; letter-spacing: -0.01em; margin-bottom: 4px; }
.toc-brand-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 28px; }
.toc-list { list-style: none; padding: 0; margin: 0; }
.toc-list li { margin: 0; }
.toc-list a {
  display: block; padding: 6px 0; padding-left: 28px;
  font-size: 13px; color: var(--ink-2); text-decoration: none;
  border-left: 1px solid transparent; position: relative;
}
.toc-list a::before {
  content: attr(data-num); position: absolute; left: 0; top: 6px;
  font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted-2);
}
.toc-list a:hover { color: var(--accent); }
.toc-list a.active { color: var(--accent); font-weight: 500; }
.toc-list .sub { padding-left: 44px; font-size: 12px; color: var(--muted); }
.toc-list .sub::before { display: none; }
.toc-group {
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-2);
  margin: 24px 0 8px;
}
.toc-soon { color: var(--muted-2); font-style: italic; }

main { padding: 64px 72px 200px; max-width: 1240px; }

/* ---------- Type ---------- */
.eyebrow {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--muted); margin-bottom: 12px;
}
h1.title {
  font-size: 56px; font-weight: 600; letter-spacing: -0.03em;
  line-height: 1.02; margin: 0 0 16px;
}
h2.chapter {
  font-size: 36px; font-weight: 600; letter-spacing: -0.025em;
  margin: 0 0 8px; line-height: 1.1;
}
h3.section-h {
  font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
  margin: 48px 0 12px;
}
h4.sub-h {
  margin: 32px 0 8px;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2);
  font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 600;
}
p.lede { font-size: 19px; color: var(--ink-2); max-width: 62ch; line-height: 1.5; margin: 0 0 24px; }
p { max-width: 68ch; margin: 0 0 14px; color: var(--ink-2); }
.chapter-num {
  display: inline-block; font-family: "JetBrains Mono", monospace;
  font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.1em;
}
hr.rule { border: 0; border-top: 1px solid var(--rule); margin: 80px 0; }

/* ---------- Chapter wrapper ---------- */
.chapter { padding-top: 24px; }
.chapter-head { margin-bottom: 32px; max-width: 70ch; }
.callout {
  background: var(--card); border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  padding: 16px 18px; border-radius: 4px;
  font-size: 14px; color: var(--ink-2);
  margin: 16px 0 24px; max-width: 70ch;
}
.callout .label {
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em;
  display: block; margin-bottom: 6px;
}

/* ---------- Lists ---------- */
ul.rules { padding-left: 0; list-style: none; max-width: 70ch; counter-reset: rule; }
ul.rules li {
  position: relative; padding: 12px 0 12px 32px;
  border-bottom: 1px solid var(--line-2); color: var(--ink-2);
}
ul.rules li:last-child { border-bottom: 0; }
ul.rules li::before {
  content: counter(rule, decimal-leading-zero);
  counter-increment: rule;
  position: absolute; left: 0; top: 13px;
  font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted);
}
ul.rules b { color: var(--ink); font-weight: 600; }

/* ---------- Do / Don't ---------- */
.dodont { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
.dodont .col {
  background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px;
}
.dodont .col .tag {
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px;
  display: inline-block;
}
.dodont .col.do .tag { color: var(--good); }
.dodont .col.dont .tag { color: var(--bad); }
.dodont .col p { margin: 0; font-size: 13px; max-width: none; }

/* ---------- Spec table ---------- */
table.spec {
  width: 100%; max-width: 70ch; border-collapse: collapse;
  font-size: 13px; margin: 16px 0;
}
table.spec th, table.spec td {
  text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line-2);
  vertical-align: top;
}
table.spec th {
  font-family: "JetBrains Mono", monospace; font-size: 11px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
}
table.spec td.k { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink); width: 40%; }

/* ---------- Cover ---------- */
.cover {
  min-height: 75vh; padding: 80px 0 60px;
  display: flex; flex-direction: column; justify-content: space-between;
  border-bottom: 1px solid var(--rule); margin-bottom: 60px;
}
.cover-foot {
  display: flex; justify-content: space-between; align-items: flex-end;
  font-family: "JetBrains Mono", monospace; font-size: 11px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
}
.cover-meta { display: flex; gap: 40px; }
.cover-meta div span { display: block; color: var(--ink); }

/* ---------- Frames (wireframe shells) ---------- */
.frames-row { display: flex; flex-wrap: nowrap; align-items: flex-start; gap: 20px 28px; margin: 16px 0 8px; overflow-x: auto; padding-bottom: 4px; }
.frame-cell { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; width: min-content; flex-shrink: 0; }
.frame-cell .caption {
  font-family: "JetBrains Mono", monospace; font-size: 11px;
  color: var(--muted); letter-spacing: 0.04em; max-width: 520px; line-height: 1.4;
}
.frame-cell .caption b { color: var(--ink); font-weight: 600; }

/* ---------- Accents ---------- */
.hl { background: linear-gradient(180deg, transparent 60%, var(--accent-soft) 60%); }
code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 0.88em; background: var(--line-2); padding: 1px 5px; border-radius: 3px; }

/* ---------- Part teaser ---------- */
.part-teaser {
  border: 1px dashed var(--line); border-radius: 8px;
  padding: 24px; margin: 24px 0; color: var(--muted);
  max-width: 70ch; background: var(--card);
}
.part-teaser .label {
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted-2);
  display: block; margin-bottom: 8px;
}

/* ---------- Print ---------- */
@media print {
  .toc { display: none; }
  .layout { grid-template-columns: 1fr; }
  main { padding: 24px; }
}
</style>
</head>
